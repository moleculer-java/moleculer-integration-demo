# ----------------------------------------------------------------------------
# Moleculer Integration Demo - Java side
# ----------------------------------------------------------------------------

spring.application.name=moleculer-integration-demo

# Keep the console focused on the moleculer discovery logs and the
# [PASS]/[FAIL] verification output.
spring.main.banner-mode=off
logging.level.root=INFO

# ----------------------------------------------------------------------------
# Demo settings (all overridable on the command line, e.g.
#   mvn spring-boot:run -Dspring-boot.run.arguments=--demo.exit-after-verify=true
# ----------------------------------------------------------------------------

# This node's unique id in the cluster (must differ from the Node.js node).
demo.node-id=java-node

# Shared NATS server both nodes connect to.
demo.nats-url=nats://localhost:4222

# Moleculer wire-protocol version. Moleculer JS 0.15 speaks "5"; moleculer-java
# 2.0.0 also defaults to "5", so this is normally redundant. Set it to "4" to
# interoperate with a legacy Moleculer JS 0.14 node.
demo.protocol-version=5

# Run the Java->Node checks automatically once the app is ready.
demo.auto-verify=true

# When true, exit the process after verifying (non-zero on failure) for CI.
# When false (default), stay up so the Node.js side can call back into Java.
demo.exit-after-verify=false

# How long to wait for the Node.js services to be discovered, and how long to
# wait for individual cross-node calls (milliseconds).
demo.wait-timeout-ms=30000
demo.call-timeout-ms=10000
